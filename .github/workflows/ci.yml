# CI / release gate. Runs on every push to main and every PR.
# Fails on: lint errors, type errors, test regressions (incl. security, a11y,
# contrast, focus-trap, and canonical/architecture/drift suites), coverage below
# threshold, code duplication over 5%, a broken production build, or a
# production-dependency vulnerability.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# One run per ref: a new push supersedes older in-progress runs on the same PR/branch,
# so the latest run is always the authoritative status and CI minutes aren't wasted on
# stale commits. main is never cancelled — every landed commit gets a full gate.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests + coverage (security, a11y, contrast, focus-trap, canonical, routes)
        run: npm run test:coverage
      - name: Duplication guard (jscpd, threshold 5%)
        run: npm run dup
      - name: Production build (no source maps, dev mode off)
        run: npm run build
      # Only production runtime deps gate the frontend; dev-tooling advisories
      # (vite/vitest/esbuild) are tracked separately and don't ship to users.
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
